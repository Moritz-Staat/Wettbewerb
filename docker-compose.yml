services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sportduel
      POSTGRES_USER: sportduel
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sportduel_secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sportduel -d sportduel"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://sportduel:${POSTGRES_PASSWORD:-sportduel_secret}@db:5432/sportduel
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-please}
      PORT: 3000
      VAPID_PUBLIC_KEY: ${VAPID_PUBLIC_KEY:-}
      VAPID_PRIVATE_KEY: ${VAPID_PRIVATE_KEY:-}
    volumes:
      - uploads:/app/uploads

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "8082:80"

volumes:
  postgres_data:
  uploads:
